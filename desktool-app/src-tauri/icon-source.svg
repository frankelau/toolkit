<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3550"/>
      <stop offset="1" stop-color="#12151f"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8def"/><stop offset="1" stop-color="#3f6fd6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43c6ac"/><stop offset="1" stop-color="#2a9d8f"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc14d"/><stop offset="1" stop-color="#f0962a"/>
    </linearGradient>
  </defs>
  <!-- 整个徽章缩到 ~80% 居中，四周留透明边，使 dock 图标视觉小一号 -->
  <g transform="translate(512 512) scale(0.8) translate(-512 -512)">
    <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
    <!-- 六边形蜂巢：模块化工具集 -->
    <g transform="translate(512 512)">
      <g transform="translate(0 -150)"><path d="M0,-104 L90,-52 L90,52 L0,104 L-90,52 L-90,-52 Z" fill="url(#g1)"/></g>
      <g transform="translate(-156 120)"><path d="M0,-104 L90,-52 L90,52 L0,104 L-90,52 L-90,-52 Z" fill="url(#g2)"/></g>
      <g transform="translate(156 120)"><path d="M0,-104 L90,-52 L90,52 L0,104 L-90,52 L-90,-52 Z" fill="url(#g3)"/></g>
    </g>
  </g>
</svg>
